<ion-header class="ion-no-border">
  <ion-toolbar color="transparent">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Pagar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="payment-content ion-padding">
  <section class="payment-shell">
    <h2>Selecciona tarjeta</h2>

    <div class="cards-scroll" *ngIf="!loading && cards.length > 0">
      <button
        type="button"
        class="card-select"
        *ngFor="let card of cards"
        [class.active]="card.id === selectedCardId"
        (click)="onCardSelected(card.id)">
        <app-card [card]="card"></app-card>
      </button>
    </div>

    <div class="empty-state card-glass" *ngIf="!loading && cards.length === 0">
      <ion-icon name="card-outline"></ion-icon>
      <p>No tienes tarjetas para pagar.</p>
      <ion-button size="small" (click)="goToAddCard()">Agregar tarjeta</ion-button>
    </div>

    <app-skeleton-loading *ngIf="loading" [count]="1"></app-skeleton-loading>

    <div class="payment-cta card-glass" *ngIf="selectedCard">
      <p>Abre el simulador para generar comercio y monto aleatorios.</p>
      <p class="bio-note" *ngIf="userProfile?.biometricEnabled">
        Se solicitará biometría antes de confirmar.
      </p>
      <ion-button expand="block" [disabled]="processing" (click)="openSimulator()">
        <ion-icon slot="start" name="cash-outline"></ion-icon>
        Simular y pagar
      </ion-button>
    </div>
  </section>
</ion-content>
